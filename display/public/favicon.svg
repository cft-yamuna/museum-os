<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Curato">
  <defs>
    <!-- Royal-black app tile -->
    <linearGradient id="mos-tile" x1="10" y1="4" x2="54" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2a3142"/>
      <stop offset="0.5" stop-color="#141823"/>
      <stop offset="1" stop-color="#080a10"/>
    </linearGradient>
    <!-- Brushed-silver metal -->
    <linearGradient id="mos-silver" x1="32" y1="10" x2="32" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f4f7fb"/>
      <stop offset="0.5" stop-color="#c3ccda"/>
      <stop offset="1" stop-color="#828da0"/>
    </linearGradient>
    <!-- Polished bright silver for the lit column -->
    <linearGradient id="mos-lit" x1="32" y1="34" x2="32" y2="49" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dfe6f0"/>
    </linearGradient>
    <!-- Soft silver glow behind the lit column -->
    <radialGradient id="mos-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(32 41) rotate(90) scale(13 9)">
      <stop offset="0" stop-color="#eef2f8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#eef2f8" stop-opacity="0"/>
    </radialGradient>
    <!-- Top sheen -->
    <linearGradient id="mos-sheen" x1="32" y1="2" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- App tile -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#mos-tile)"/>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#mos-sheen)"/>

  <!-- Glow for the powered display -->
  <ellipse cx="32" cy="41" rx="13" ry="9" fill="url(#mos-glow)"/>

  <!-- Museum mark in silver -->
  <g fill="url(#mos-silver)">
    <!-- Pediment (roof) -->
    <path d="M32 11 L52 27 L12 27 Z" stroke="#f4f7fb" stroke-width="0.75" stroke-linejoin="round"/>
    <!-- Architrave (lintel) -->
    <rect x="12.5" y="28.5" width="39" height="4" rx="1.6"/>
    <!-- Outer columns -->
    <rect x="15" y="34" width="6" height="15" rx="2"/>
    <rect x="43" y="34" width="6" height="15" rx="2"/>
    <!-- Stylobate (steps) -->
    <rect x="12" y="51" width="40" height="3.6" rx="1.6"/>
    <rect x="9.5" y="55.2" width="45" height="3.3" rx="1.6" opacity="0.85"/>
  </g>

  <!-- Center column lit = a display powered by the OS -->
  <rect x="29" y="34" width="6" height="15" rx="2" fill="url(#mos-lit)"/>

  <!-- Silver edge for a crisp, premium border -->
  <rect x="2.5" y="2.5" width="59" height="59" rx="13.5" fill="none" stroke="#c3ccda" stroke-opacity="0.22"/>
</svg>
