# Windows / Docker Desktop compose file.
#
# The production docker-compose.yml uses `network_mode: host` because the Linux
# server needs LAN-level broadcast (Wake-on-LAN / device power-on). Host networking
# does NOT expose ports to Windows (containers run inside the WSL2 VM), so on
# Docker Desktop the app is unreachable at localhost:3401.
#
# This file uses a normal bridge network with published ports instead, so the app
# is reachable from the Windows host. The app reaches Postgres by its service name
# (museumos-db) over Docker's internal DNS rather than 127.0.0.1.
#
# Usage on Windows:
#   docker compose -f docker-compose.windows.yml --env-file .env.production up -d --build
#
# Reuses the same `pgdata` volume as the production file (same project name), so
# database data is shared. Run only ONE of the two compose files at a time.

services:
  museumos-db:
    image: postgres:16-alpine
    container_name: museumos-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: ${POSTGRES_DB:-museumos}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5

  museumos-app:
    build: .
    container_name: museumos-app
    restart: unless-stopped
    ports:
      - "${PORT:-3401}:${PORT:-3401}"
    depends_on:
      museumos-db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3401}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@museumos-db:5432/${POSTGRES_DB:-museumos}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.production}
      JWT_EXPIRY: ${JWT_EXPIRY:-24h}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      STORAGE_PATH: /app/server/storage
      # Local JSON backups — Docker DB stays primary, these are a host-side duplicate.
      BACKUP_DIR: /app/server/backups
      BACKUP_ENABLED: ${BACKUP_ENABLED:-true}
      BACKUP_CRON: ${BACKUP_CRON:-0 */6 * * *}
      BACKUP_KEEP: ${BACKUP_KEEP:-14}
    volumes:
      - ${HOST_STORAGE_PATH:-./server/storage}:/app/server/storage
      - ${HOST_AGENT_PATH:-./agent}:/app/agent
      # Bind-mount to a real host folder so the JSON backups are saved locally.
      - ${HOST_BACKUP_PATH:-./server/backups}:/app/server/backups

volumes:
  pgdata:
