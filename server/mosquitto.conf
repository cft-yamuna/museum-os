# Curato - Mosquitto MQTT Broker Config
# Place at /etc/mosquitto/mosquitto.conf or run: mosquitto -c mosquitto.conf

# TCP listener for ESP32 hardware controllers
listener 1883

# WebSocket listener for browser-based MQTT clients
listener 1884
protocol websockets

# No authentication (closed LAN)
allow_anonymous true

# Message size limit (hardware events are small)
message_size_limit 1024

# Logging
log_type all
log_dest stdout

# Persistence
persistence true
persistence_location /var/lib/mosquitto/

# Connection limits
max_connections 100
