# Curato - Nginx Configuration
# Place in /etc/nginx/sites-available/curato

upstream curato_api {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    server_name curato.local;

    # Redirect HTTP to HTTPS (uncomment when SSL is configured)
    # return 301 https://$server_name$request_uri;

    # Max upload size (for content uploads)
    client_max_body_size 2g;

    # API proxy
    location /api/ {
        proxy_pass http://curato_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Upload timeout (longer for content uploads)
        location /api/content {
            proxy_pass http://curato_api;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
        }
    }

    # Storage (media files)
    location /storage/ {
        proxy_pass http://curato_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_valid 200 1h;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # WebSocket - Display clients
    location /ws {
        proxy_pass http://curato_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # WebSocket - Admin clients
    location /ws/admin {
        proxy_pass http://curato_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Display SPA
    location /display {
        proxy_pass http://curato_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin UI (served from built static files)
    location / {
        proxy_pass http://curato_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Health check (for monitoring)
    location /api/health {
        proxy_pass http://curato_api;
        access_log off;
    }
}
